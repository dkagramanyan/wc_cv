name: Build and deploy
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false
defaults:
  run:
    shell: bash
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # The combra submodule is imported by autodoc to render the API pages.
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Install combra (autodoc imports it)
        # The [viz] extra pulls plotly so the plot modules import; the torch
        # metrics stack is imported lazily inside functions, so it isn't needed
        # just to introspect signatures + docstrings.
        run: pip install -e "./combra[viz]"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build the site (warnings are errors)
        run: python -m sphinx -b html -W --keep-going -j auto docs public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    # Only publish from the default branch; pull requests build but do not deploy.
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
